<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Berrima Buslines – Select Bus</title>
  <style>

.depot .cards{display:grid;gap:10px}
.depot .cards.two{grid-template-columns:1fr 1fr}
.depot .cards.one{grid-template-columns:1fr}
.card-title{font-weight:700;letter-spacing:.06em;font-size:12px}
.card-time{font-size:18px;font-weight:800;margin-top:4px}
.card-note{margin-top:6px;opacity:.92}

    :root { --border:#e6e6e6; --muted:#666; --bg:#f7f7f7; --accent:#111; --panel:#ffffff; }
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; margin: 0; line-height: 1.35; background: var(--bg); color:#111; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 16px; }
    .card { border: 1px solid var(--border); border-radius: 18px; padding: 16px; margin-bottom: 14px; background: var(--panel); box-shadow: 0 1px 2px rgba(0,0,0,.04); }
    .header { display:flex; align-items:center; gap:14px; }
    .logo { height: 46px; width:auto; }
    .title { font-size: 20px; font-weight: 900; }
    .meta { margin-top: 6px; color:#222; }
    .meta div { margin-top: 3px; }
    .label { font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; font-weight:700; }
    .btn {
      display:block; text-decoration:none; color:#111; background:#fff;
      border:1px solid var(--border); border-radius: 18px;
      padding: 16px; margin: 10px 0; font-weight: 900;
    }
    .btn-main { display:block; font-size: 20px; line-height:1.1; }
    .btn-sub { display:block; margin-top:5px; color:var(--muted); font-size: 13px; font-weight:700; }
    .last-updated { display:inline-block; margin-top:10px; padding:8px 10px; border-radius:12px; background:#f1f1f1; font-size:12px; font-weight:700; }
    .muted { color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="header">
      <img src="berrima_buslines.jpg" class="logo" alt="Berrima Buslines" />
      <div>
        <div class="title">Driver Mobile View</div>
        <div class="meta">
          <div><b>WEDDING SERVICE</b></div>
          <div><b>21-03-2026</b></div>
          <div>CLIENT: <b>GEORGINA &amp; JOHN</b></div>
          <div>VENUE: <b>THE BOOK BARN (ARRIVE 3:00PM / DEPART 11:00PM)</b></div>
        </div>
        <div class="last-updated">LAST UPDATED: 18-03-2026 10:10PM</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="label">Select your bus</div>
    <a class="btn" href="bus_1.html">
      <span class="btn-main">BUS 1</span>
      <span class="btn-sub">9 stops</span>
    </a>
    <div class="muted">Tip: bookmark this page for tonight’s job.</div>
  </div>

  <div class="card">
    <div class="muted">BERRIMA BUSLINES • Mobile View</div>
  </div>
</div>
</body>
</html>
